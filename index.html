<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0e1a" />
    <meta name="description" content="Live Football & Cricket streams" />
    <title>FootLive · Football & Cricket</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="logo-dot"></span>
        <h1>Live<span>Sports</span></h1>
      </div>
      <nav class="filters" id="sportFilters">
        <!-- Sport filter buttons injected by JS -->
      </nav>
      <button id="refreshBtn" class="refresh-btn" title="Refresh">
        <svg
          viewBox="0 0 24 24"
          width="20"
          height="20"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="23 4 23 10 17 10" />
          <polyline points="1 20 1 14 7 14" />
          <path
            d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"
          />
        </svg>
      </button>
    </header>

    <main>
      <section id="status" class="status" aria-live="polite"></section>

      <div id="playerSection" class="player-section hidden">
        <div class="player-wrap">
          <button id="closePlayer" class="close-btn" title="Close">
            &times;
          </button>
          <iframe
            id="streamPlayer"
            src=""
            width="100%"
            height="100%"
            frameborder="0"
            allow="autoplay; fullscreen; encrypted-media"
            allowfullscreen
          ></iframe>
        </div>
        <div class="player-toolbar">
          <div id="streamInfo" class="stream-info"></div>
          <button
            id="nextServerBtn"
            class="next-server-btn"
            title="Try the next server"
          >
            <span class="next-label">Next Server</span>
            <svg
              viewBox="0 0 24 24"
              width="16"
              height="16"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polygon points="5 4 15 12 5 20 5 4" />
              <line x1="19" y1="5" x2="19" y2="19" />
            </svg>
          </button>
        </div>
        <div id="streamHint" class="stream-hint"></div>
        <div id="streamOptions" class="stream-options"></div>
      </div>

      <section id="matches" class="matches-grid"></section>
    </main>

    <footer class="footer">
      <p>Data from streamed.pk &middot; For educational use only.</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
